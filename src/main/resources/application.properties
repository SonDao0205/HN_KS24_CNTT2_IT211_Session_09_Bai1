spring.application.name=Bai1

#Config Logging / C?p ?? log : TRACE - DEBUG - INFO - WARN - ERROR
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} - %-5level - %logger{50} - %msg%n
logging.logback.rollingpolicy.max-file-size=2GB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.com.btvn.coursecatalog = INFO
